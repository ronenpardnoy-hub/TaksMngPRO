const MiniBarChart = ({data, keys, colors=['#10b981','#6366f1'], height=160}) => {
  const max = Math.max(...data.flatMap(d => keys.map(k => +d[k]||0)), 1);
  return (
    <div style={{height, display:'flex', alignItems:'flex-end', gap:2, padding:'0 4px 16px', position:'relative'}}>
      {[0.25,0.5,0.75,1].map(p=>(
        <div key={p} style={{position:'absolute',left:0,right:0,bottom:`calc(16px + ${p*(height-16)}px)`,borderTop:'1px solid rgba(255,255,255,0.04)',pointerEvents:'none'}}/>

      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end'}}>

        </div>
      ))}
    </div>
  );
};

const MiniAreaChart = ({data, dataKey, color='#6366f1', height=160}) => {
  const vals = data.map(d=>+d[dataKey]||0);
  const max = Math.max(...vals,1);
  const W=300, H=height-24;
  const pts = vals.map((v,i)=>[i/(vals.length-1||1)*W, H-(v/max)*H]);
  const line = pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const area = line+` L${W},${H} L0,${H} Z`;
  const gid = `ag${Math.random().toString(36).slice(2,6)}`;
  return (
    <div style={{height}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} preserveAspectRatio="none" style={{display:'block'}}>
        <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient></defs>
        <path d={area} fill={`url(#${gid})`}/>
        <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>

      <div style={{display:'flex',justifyContent:'space-between',padding:'2px 4px 0'}}>

};

const MiniDualChart = ({data, k1, k2, c1='#6366f1', c2='#10b981', height=70}) => {
  const all = data.flatMap(d=>[(+d[k1]||0),(+d[k2]||0)]);
  const max = Math.max(...all,1);
  const W=300, H=height;
  const path = (key,col) => {
    const pts = data.map((d,i)=>[i/(data.length-1||1)*W, H-((+d[key]||0)/max)*H]);
    return pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  };
  const p1=path(k1), p2=path(k2);
  const gid=`dg${Math.random().toString(36).slice(2,5)}`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={height} preserveAspectRatio="none">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">

      <path d={p2} fill="none" stroke={c2} strokeWidth="1.5" strokeLinecap="round" strokeDasharray="4 3"/>

  );
};

// ─── SUPABASE DATA HOOK ───────────────────────────────────────────────────────
// Architecture: one row per user in each table, storing all data as JSONB.
// Table schema (run in Supabase SQL editor — see SETUP.md):
//   user_data (user_id text PK, goals jsonb, kpis jsonb, team jsonb, updated_at timestamptz)
// Realtime: Supabase Realtime on the user_data table, filtered to the user's row.
function useAppData() {
  const [user,setUser]=useState(undefined);   // undefined=loading, null=signed out, obj=signed in
  const [ready,setReady]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [dbError,setDbError]=useState(null);
  const [goals,setGoals]=useState([]);
  const [kpis,setKpis]=useState([]);
  const [team,setTeam]=useState([]);
  const seeded=useRef(false);
  const saveTimer=useRef(null);
  const localState=useRef({goals:[],kpis:[],team:[]});

  const uid=user?.id||null;

  // ── Auth ──────────────────────────────────────────────────────────────────
  const signIn=()=>window._db.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo: window.location.href, queryParams:{prompt:'select_account'}},
  });
  const signOut=async()=>{
    await window._db.auth.signOut();
    setReady(false); setGoals([]); setKpis([]); setTeam([]);
    seeded.current=false;
  };

  useEffect(()=>{
    // Get initial session (handles page reload after OAuth redirect)
    window._db.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    // Listen for auth changes
    const {data:{subscription}}=window._db.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return ()=>subscription.unsubscribe();
  },[]);

  // ── Load & subscribe to data ───────────────────────────────────────────────
  useEffect(()=>{
    if(!uid){setReady(false);return;}

    let channel;
    const load=async()=>{
      const {data,error}=await window._db
        .from('user_data')
        .select('goals,kpis,team')
        .eq('user_id',uid)
        .single();

      if(error && error.code!=='PGRST116'){
        // PGRST116 = row not found (first login)
        setDbError(error.message); setReady(true); return;
      }

      if(!data && !seeded.current){
        // First login — seed demo data
        seeded.current=true;
        await window._db.from('user_data').upsert({
          user_id:uid, goals:SEED_GOALS, kpis:SEED_KPIS, team:SEED_TEAM,
          updated_at:new Date().toISOString(),
        });
        setGoals(SEED_GOALS); setKpis(SEED_KPIS); setTeam(SEED_TEAM);
        localState.current={goals:SEED_GOALS,kpis:SEED_KPIS,team:SEED_TEAM};
      } else if(data){
        setGoals(data.goals||[]); setKpis(data.kpis||[]); setTeam(data.team||[]);
        localState.current={goals:data.goals||[],kpis:data.kpis||[],team:data.team||[]};
      }
      setReady(true);

      // Realtime subscription — syncs changes from other devices/tabs
      channel=window._db
        .channel(`user_data:${uid}`)
        .on('postgres_changes',{
          event:'UPDATE', schema:'public', table:'user_data',
          filter:`user_id=eq.${uid}`,
        },(payload)=>{
          const d=payload.new;
          // Only apply if this update came from another device (not ourselves)
          setGoals(d.goals||[]); setKpis(d.kpis||[]); setTeam(d.team||[]);
          localState.current={goals:d.goals||[],kpis:d.kpis||[],team:d.team||[]};
        })
        .subscribe();
    };

    load();
    return ()=>{ if(channel) window._db.removeChannel(channel); };
  },[uid]);

  // ── Save helper — debounced to avoid hammering the DB ─────────────────────
  const persist=useCallback((next)=>{
    localState.current=next;
    setSyncing(true);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const {error}=await window._db.from('user_data').upsert({
        user_id:uid, ...localState.current,
        updated_at:new Date().toISOString(),
      });
      if(error) setDbError(error.message);
      setSyncing(false);
    },800);
  },[uid]);

  // ── Mutation helpers ───────────────────────────────────────────────────────
  const mutateGoal=(gid,fn)=>setGoals(prev=>{
    const next=prev.map(g=>g.id!==gid?g:fn(g));
    persist({...localState.current,goals:next}); return next;
  });
  const mutateKpi=(kid,fn)=>setKpis(prev=>{
    const next=prev.map(k=>k.id!==kid?k:fn(k));
    persist({...localState.current,kpis:next}); return next;
  });
  const mutateTeam=(fn)=>setTeam(prev=>{
    const next=fn(prev);
    persist({...localState.current,team:next}); return next;
  });

  return {
    user, uid, ready, syncing, dbError, signIn, signOut,
    goals, kpis, team,
    mutateGoal,
    deleteGoal:id=>{setGoals(p=>{const n=p.filter(g=>g.id!==id);persist({...localState.current,goals:n});return n;})},
    addGoal:g=>{setGoals(p=>{const n=[...p,g];persist({...localState.current,goals:n});return n;})},
    mutateKpi,
    deleteKpi:id=>{setKpis(p=>{const n=p.filter(k=>k.id!==id);persist({...localState.current,kpis:n});return n;})},
    addKpi:k=>{setKpis(p=>{const n=[...p,k];persist({...localState.current,kpis:n});return n;})},
    saveMember:m=>mutateTeam(prev=>prev.map(x=>x.id===m.id?m:x)),
    deleteMember:id=>{
      mutateTeam(prev=>prev.filter(x=>x.id!==id));
      setGoals(prev=>{const n=prev.map(g=>({...g,tasks:(g.tasks||[]).map(t=>({...t,assigneeIds:(t.assigneeIds||[]).filter(a=>a!==id)}))}));persist({...localState.current,goals:n});return n;});
    },
    addMember:m=>mutateTeam(prev=>[...prev,m]),
    resetAll:()=>{
      setGoals([]); setKpis([]); setTeam([]);
      persist({goals:[],kpis:[],team:[]});
    },
  };
}

const Avatar=({name,size='sm'})=>{
  const colors=['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
  const c=colors[(name||'U').charCodeAt(0)%colors.length];
  return <div style={{backgroundColor:c,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,color:'#fff',flexShrink:0,...(size==='sm'?{width:24,height:24,fontSize:9}:{width:36,height:36,fontSize:14})}}>{(name||'U')[0].toUpperCase()}</div>;
};

const Ring=({value,size=40,stroke=3})=>{
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,off=circ-(value/100)*circ;
  const color=value===100?'#10b981':value>60?'#6366f1':value>30?'#f59e0b':'#ef4444';
  return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.8s ease'}}/>
    <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle" style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,fill:color,fontSize:9,fontWeight:900}}>{value}%</text>
  </svg>;
};

const TrendBadge=({value,unit=''})=>{
  if(!value) return <span style={{color:'#94a3b8',fontSize:9,fontWeight:700}}>— Flat</span>;
  return <span style={{color:value>0?'#34d399':'#f87171',fontSize:9,fontWeight:700}}>{value>0?'↑':'↓'}{Math.abs(value)}{unit}</span>;
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const {user,uid,ready,syncing,dbError,signIn,signOut,
         goals,kpis,team,
         mutateGoal,deleteGoal,addGoal,
         mutateKpi,deleteKpi,addKpi,
         saveMember,deleteMember,addMember,resetAll} = useAppData();

  const [view,setView]=useState('dashboard');
  const [dm,setDm]=useState(true);
