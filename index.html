          <div style={{borderRadius:10,border:'1px solid rgba(255,255,255,0.05)',maxHeight:220,overflowY:'auto',marginBottom:10,fontSize:13}}>
            {importPrev.goals?.length>0&&<div style={{padding:12}}>
              <div style={{fontSize:12,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.08em',color:'#818cf8',marginBottom:8}}>{importPrev.goals.length} Goal{importPrev.goals.length!==1?'s':''} · {importPrev.goals.flatMap(g=>g.tasks||[]).length} Tasks</div>
              {importPrev.goals.map((g,gi)=><div key={gi} style={{marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 8px',borderRadius:8,background:'rgba(99,102,241,0.08)',marginBottom:6}}>
                  <I n="target" size={9} color="#818cf8"/>
                  <input style={{flex:1,background:'none',border:'none',outline:'none',fontWeight:900,color:'#818cf8',fontSize:13,minWidth:0}} value={g.name} onChange={e=>{const u=JSON.parse(JSON.stringify(importPrev));u.goals[gi].name=e.target.value;setImportPrev(u);}}/>
                  <select value={g.quarter||1} onChange={e=>{const u=JSON.parse(JSON.stringify(importPrev));u.goals[gi].quarter=+e.target.value;setImportPrev(u);}} style={{background:'none',border:'none',outline:'none',fontSize:14,color:'#818cf8',fontWeight:900,cursor:'pointer',width:28}}>{[1,2,3,4].map(q=><option key={q} value={q}>Q{q}</option>)}</select>
                  <button onClick={()=>{const u=JSON.parse(JSON.stringify(importPrev));u.goals.splice(gi,1);setImportPrev(u);}} style={{background:'none',border:'none',cursor:'pointer',color:'#f87171'}}><I n="x" size={9}/></button>
                </div>
                {(g.tasks||[]).map((t,ti)=><div key={ti} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px 4px 20px'}}>
                  <I n="chevRight" size={8} color="#475569"/>
                  <input style={{flex:1,background:'none',border:'none',outline:'none',fontSize:13,fontWeight:500,color:'#94a3b8',minWidth:0}} value={t.name} onChange={e=>{const u=JSON.parse(JSON.stringify(importPrev));u.goals[gi].tasks[ti].name=e.target.value;setImportPrev(u);}}/>
                  <span style={{fontSize:14,color:'#475569',flexShrink:0}}>{MONTHS[(t.month||1)-1]}</span>
                  <button onClick={()=>{const u=JSON.parse(JSON.stringify(importPrev));u.goals[gi].tasks.splice(ti,1);setImportPrev(u);}} style={{background:'none',border:'none',cursor:'pointer',color:'#f87171',opacity:0.5}}><I n="x" size={8}/></button>
                </div>)}
              </div>)}
            </div>}
            {importPrev.kpis?.length>0&&<div style={{padding:12,borderTop:'1px solid rgba(255,255,255,0.05)'}}>
              <div style={{fontSize:12,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.08em',color:'#60a5fa',marginBottom:8}}>{importPrev.kpis.length} KPI{importPrev.kpis.length!==1?'s':''}</div>
              {importPrev.kpis.map((k,ki)=><div key={ki} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px'}}>
                <I n="barChart" size={8} color="#60a5fa"/>
                <input style={{flex:1,background:'none',border:'none',outline:'none',fontSize:13,fontWeight:500,color:'#94a3b8',minWidth:0}} value={k.name} onChange={e=>{const u=JSON.parse(JSON.stringify(importPrev));u.kpis[ki].name=e.target.value;setImportPrev(u);}}/>
                <span style={{fontSize:14,color:'#475569',flexShrink:0}}>{k.unit||'%'} · {k.type==='lower'?'↓':'↑'}</span>
                <button onClick={()=>{const u=JSON.parse(JSON.stringify(importPrev));u.kpis.splice(ki,1);setImportPrev(u);}} style={{background:'none',border:'none',cursor:'pointer',color:'#f87171',opacity:0.5}}><I n="x" size={8}/></button>
              </div>)}
            </div>}
          </div>
          <p style={{fontSize:12,color:'#64748b',textAlign:'center',marginBottom:10}}>✏️ Click any name to edit before importing</p>
          <div style={{display:'flex',gap:8}}><BtnGhost onClick={()=>{setImportStep('input');setImportPrev(null);}}/><Btn onClick={execImport} color="emerald">Import All ✓</Btn></div>
        </>}

        {importStep==='importing'&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'40px 0',gap:16}}>
          <div style={{position:'relative',width:56,height:56}}><div style={{position:'absolute',inset:0,borderRadius:'50%',border:'4px solid rgba(16,185,129,0.2)'}}/><div style={{position:'absolute',inset:0,borderRadius:'50%',border:'4px solid transparent',borderTopColor:'#10b981'}} className="spin"/></div>
          <div style={{textAlign:'center'}}><div style={{fontWeight:900,fontSize:13,marginBottom:4}}>Importing…</div><div style={{fontSize:13,color:'#64748b'}}>Saving to Supabase</div></div>
        </div>}
      </Modal>}

      {/* ── STATUS MANAGER MODAL ── */}
      {statusMgrM&&<div style={{position:'fixed',inset:0,zIndex:80,display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)'}} onClick={()=>setStatusMgrM(false)}>
        <div style={{width:'100%',maxWidth:400,borderRadius:20,background:'#0f172a',border:'1px solid rgba(245,158,11,0.25)',boxShadow:'0 25px 60px rgba(0,0,0,0.6)',overflow:'hidden'}} className="fadein" onClick={e=>e.stopPropagation()}>
          <div style={{padding:'20px 20px 16px',borderBottom:'1px solid rgba(255,255,255,0.06)',background:'linear-gradient(135deg,rgba(245,158,11,0.08),transparent)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:32,height:32,borderRadius:10,background:'rgba(245,158,11,0.15)',border:'1px solid rgba(245,158,11,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="activity" size={14} color="#f59e0b"/></div>
                <h3 style={{fontSize:14,fontWeight:900}}>{statusEdit==='new'?'New Status':'Edit Status'}</h3>
              </div>
              <button onClick={()=>setStatusMgrM(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#64748b',padding:4}}><I n="x" size={14}/></button>
            </div>
          </div>
          <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
            {/* Label */}
            <div>
              <label style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.06em',color:'#64748b',display:'block',marginBottom:6}}>Status Name</label>
              <input value={statusForm.label} onChange={e=>setStatusForm(p=>({...p,label:e.target.value}))} placeholder="e.g. In Review" style={{width:'100%',boxSizing:'border-box',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,padding:'9px 12px',fontSize:13,fontWeight:600,color:'#e2e8f0',outline:'none'}}/>
            </div>
            {/* Color */}
            <div>
              <label style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.06em',color:'#64748b',display:'block',marginBottom:8}}>Color</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:8}}>
                {['#64748b','#f59e0b','#10b981','#ef4444','#6366f1','#3b82f6','#ec4899','#8b5cf6','#06b6d4','#f97316'].map(c=>(
                  <button key={c} onClick={()=>setStatusForm(p=>({...p,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,border:statusForm.color===c?'3px solid #fff':'2px solid transparent',cursor:'pointer',boxShadow:statusForm.color===c?`0 0 10px ${c}`:'none',transition:'all .15s'}}/>
                ))}
                <input type="color" value={statusForm.color} onChange={e=>setStatusForm(p=>({...p,color:e.target.value}))} style={{width:28,height:28,borderRadius:'50%',border:'1px solid rgba(255,255,255,0.15)',cursor:'pointer',padding:0,background:'none'}} title="Custom color"/>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:`1px solid ${statusForm.color}40`}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:statusForm.color,boxShadow:`0 0 8px ${statusForm.color}`}}/>
                <span style={{fontSize:12,fontWeight:700,color:statusForm.color||'#e2e8f0'}}>{statusForm.label||'Preview'}</span>
              </div>
            </div>
            {/* Action */}
            <div>
              <label style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.06em',color:'#64748b',display:'block',marginBottom:8}}>Action on Tasks</label>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {[
                  {id:'none',    label:'No Action',        desc:'Just changes the label'},
                  {id:'complete',label:'Mark as Done',     desc:'Counts task as complete, strikethrough'},
                  {id:'active',  label:'Mark as Active',   desc:'Shows dot indicator, amber progress'},
                  {id:'cancel',  label:'Mark as Cancelled',desc:'Dims task, strikethrough, excluded from progress'},
                ].map(a=>(
                  <button key={a.id} onClick={()=>setStatusForm(p=>({...p,action:a.id}))} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:statusForm.action===a.id?'rgba(245,158,11,0.1)':'rgba(255,255,255,0.02)',border:statusForm.action===a.id?'1px solid rgba(245,158,11,0.3)':'1px solid rgba(255,255,255,0.06)',cursor:'pointer',textAlign:'left'}}>
                    <div style={{width:14,height:14,borderRadius:'50%',border:`2px solid ${statusForm.action===a.id?'#f59e0b':'#334155'}`,background:statusForm.action===a.id?'#f59e0b':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {statusForm.action===a.id&&<div style={{width:5,height:5,borderRadius:'50%',background:'#fff'}}/>}
                    </div>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:statusForm.action===a.id?'#fcd34d':'#e2e8f0'}}>{a.label}</div>
                      <div style={{fontSize:11,color:'#64748b',marginTop:1}}>{a.desc}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
            {/* Save */}
            <button disabled={!statusForm.label.trim()} onClick={()=>{
              if(!statusForm.label.trim())return;
              const id=statusEdit==='new'?statusForm.label.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+(Date.now()%10000):customStatuses[statusEdit]?.id;
              const entry={id,label:statusForm.label.trim(),color:statusForm.color,action:statusForm.action};
              if(statusEdit==='new') saveStatuses([...customStatuses,entry]);
              else saveStatuses(customStatuses.map((s,i)=>i===statusEdit?entry:s));
              setStatusMgrM(false);
            }} style={{padding:'10px',borderRadius:10,fontSize:13,fontWeight:800,background:statusForm.label.trim()?'#f59e0b':'rgba(255,255,255,0.05)',color:statusForm.label.trim()?'#000':'#475569',border:'none',cursor:statusForm.label.trim()?'pointer':'default',transition:'all .15s'}}>
              {statusEdit==='new'?'Create Status':'Save Changes'}
            </button>
          </div>
        </div>
      </div>}

      {/* ── STATUS PICKER DROPDOWN ── */}
      {statusPicker&&<>
        <div style={{position:'fixed',inset:0,zIndex:74}} onClick={()=>setStatusPicker(null)}/>
        <div style={{position:'fixed',left:Math.min(statusPicker.x,window.innerWidth-180),top:statusPicker.y,zIndex:75,width:170,borderRadius:12,background:'#0f172a',border:'1px solid rgba(255,255,255,0.1)',boxShadow:'0 12px 40px rgba(0,0,0,0.6)',overflow:'hidden',padding:4}} className="fadein">
          {customStatuses.map(s=>{
            const isCurrent=statusPicker.type==='task'
              ?(goals.flatMap(g=>g.tasks).find(t=>t.id===statusPicker.tid)?.status||'open')===s.id
              :(goals.flatMap(g=>g.tasks).flatMap(t=>t.subtasks||[]).find(sub=>sub.id===statusPicker.sid)?.status||'open')===s.id;
            return(
              <button key={s.id} onClick={()=>{
                if(statusPicker.type==='task') setTaskStatus(statusPicker.gid,statusPicker.tid,s.id);
                else setSubStatus(statusPicker.gid,statusPicker.tid,statusPicker.sid,s.id);
                setStatusPicker(null);
              }} style={{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,background:isCurrent?`${s.color}18`:'transparent',border:'none',cursor:'pointer',textAlign:'left',transition:'background .1s'}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0,boxShadow:`0 0 6px ${s.color}80`}}/>
                <span style={{fontSize:13,fontWeight:700,color:isCurrent?s.color:'#e2e8f0',flex:1}}>{s.label}</span>
                {isCurrent&&<I n="check" size={10} color={s.color}/>}
              </button>
            );
          })}
        </div>
      </>}

      {/* ── Demo notice (shown once on first login) ── */}
      {demoNotice&&<div style={{position:'fixed',inset:0,zIndex:70,display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(8px)'}} onClick={()=>setDemoNotice(false)}>
        <div style={{width:'100%',maxWidth:440,borderRadius:20,background:'#0f172a',border:'1px solid rgba(99,102,241,0.3)',boxShadow:'0 25px 60px rgba(0,0,0,0.6)',overflow:'hidden'}} className="fadein" onClick={e=>e.stopPropagation()}>
          {/* Header */}
          <div style={{background:'linear-gradient(135deg,rgba(99,102,241,0.15),rgba(16,185,129,0.1))',padding:'24px 24px 16px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <div style={{width:40,height:40,borderRadius:12,background:'rgba(99,102,241,0.2)',border:'1px solid rgba(99,102,241,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <I n="sparkles" size={18} color="#818cf8"/>
              </div>
              <div>
                <div style={{fontSize:17,fontWeight:900,color:'#f1f5f9'}}>Welcome to TaskMngPRO!</div>
                <div style={{fontSize:12,color:'#64748b',marginTop:1}}>You're looking at sample data</div>
              </div>
            </div>
          </div>
          {/* Body */}
          <div style={{padding:'20px 24px'}}>
            <div style={{fontSize:14,color:'#94a3b8',lineHeight:1.7,marginBottom:16}}>
              To help you get started, we've pre-loaded your workspace with <span style={{color:'#818cf8',fontWeight:700}}>demo goals, KPIs, and team members</span>. This is not real data.
            </div>
            <div style={{borderRadius:12,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',padding:'14px 16px',marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:800,color:'#e2e8f0',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>To start fresh:</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {[
                  {n:1,text:'Open the ',bold:'Settings',text2:' tab (⚙ icon in the bottom nav)'},
                  {n:2,text:'Scroll down to ',bold:'Danger Zone',text2:''},
                  {n:3,text:'Click ',bold:'"Reset All Data"',text2:' to wipe the demo and start from scratch'},
                ].map(s=>(
                  <div key={s.n} style={{display:'flex',alignItems:'flex-start',gap:10}}>
                    <div style={{width:20,height:20,borderRadius:6,background:'rgba(99,102,241,0.15)',border:'1px solid rgba(99,102,241,0.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:11,fontWeight:900,color:'#818cf8'}}>{s.n}</div>
                    <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.5}}>
                      {s.text}<span style={{color:'#e2e8f0',fontWeight:700}}>{s.bold}</span>{s.text2||''}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <button onClick={()=>setDemoNotice(false)} style={{width:'100%',padding:'12px',borderRadius:12,background:'#4f46e5',color:'#fff',border:'none',cursor:'pointer',fontSize:14,fontWeight:800,letterSpacing:'0.02em',boxShadow:'0 4px 12px rgba(79,70,229,0.35)'}}>
              Got it — explore the demo
            </button>
          </div>
        </div>
      </div>}

      {/* ── Undo toast stack ── */}
      {undoStack.length>0&&<div style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',display:'flex',flexDirection:'column',gap:8,zIndex:999,pointerEvents:'none'}}>
        {undoStack.map(u=>(
          <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderRadius:12,background:'#1e293b',border:'1px solid rgba(255,255,255,0.12)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)',pointerEvents:'all',animation:'fadeIn .2s ease'}}>
            <I n="trash" size={14} color="#f87171"/>
            <span style={{fontSize:13,fontWeight:600,color:'#e2e8f0'}}>{u.label} deleted</span>
            <button onClick={u.undo} style={{padding:'4px 12px',borderRadius:8,background:'#4f46e5',color:'#fff',border:'none',cursor:'pointer',fontSize:12,fontWeight:700,marginLeft:4}}>Undo</button>
            <button onClick={()=>{clearTimeout(undoTimers.current[u.id]);setUndoStack(p=>p.filter(x=>x.id!==u.id));}} style={{background:'none',border:'none',cursor:'pointer',color:'#64748b',padding:2}}><I n="x" size={12}/></button>
          </div>
        ))}
      </div>}

    </div>
  );
}

// Global error boundary — catches React render crashes
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  render(){
    if(this.state.err) return (
      <div style={{minHeight:'100vh',background:'#080c14',display:'flex',alignItems:'center',justifyContent:'center',padding:24,fontFamily:'sans-serif'}}>
        <div style={{maxWidth:500,width:'100%',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:16,padding:28}}>
          <div style={{fontSize:28,marginBottom:12}}>⚠️</div>
          <div style={{fontSize:16,fontWeight:900,color:'#f87171',marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:14,color:'#94a3b8',lineHeight:1.8,wordBreak:'break-all',whiteSpace:'pre-wrap',background:'rgba(0,0,0,0.3)',borderRadius:8,padding:12,marginBottom:12}}>{this.state.err.message}</div>
          <div style={{fontSize:14,color:'#64748b',lineHeight:1.7}}>
            <b style={{color:'#94a3b8'}}>Common fixes:</b><br/>
            1. Make sure SUPABASE_URL and SUPABASE_ANON are filled in correctly<br/>
            2. Make sure you ran the SQL to create the user_data table<br/>
            3. Check Row Level Security policies were created
          </div>
        </div>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
